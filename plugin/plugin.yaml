name: fmsg-platform
label: fmsg
kind: platform
version: 0.2.0
description: >
  fmsg platform adapter for Hermes Agent. Real-time inbound over the
  fmsg-webapi WebSocket (/fmsg/ws), outbound via its JSON REST routes.
  Authenticates with an fmsg API key (fmsgk_...) exchanged for a
  short-lived JWT — run the agent as a derived sub-account such as
  @alice_hermes@example.com. Only httpx + websockets, no SDK.
author: markmnl
requires_env:
  - name: FMSG_API_URL
    description: "Base URL of fmsg-webapi (hosted default: https://api.fmsg.io)"
    prompt: "fmsg API URL [https://api.fmsg.io]"
    password: false
  - name: FMSG_API_KEY
    description: "fmsg API key (fmsgk_<key_id>_<secret>) for the agent's sub-account"
    prompt: "fmsg API key"
    password: true
    secret: true
  - name: FMSG_HOME_CHANNEL
    description: "Your fmsg address (owner). Used for cron/notifications and as the default allowed sender"
    prompt: "Your fmsg address e.g. @you@example.com"
    password: false
  - name: FMSG_ALLOWED_USERS
    description: "Who may message the agent (comma-separated @user@domain). Use your address at minimum"
    prompt: "Allowed senders (comma-separated; usually same as home)"
    password: false
optional_env:
  - name: FMSG_ALLOW_ALL_USERS
    description: "Allow any fmsg address to talk to the agent (dev only — disables allowlist)"
    prompt: "Allow all senders? (true/false)"
    password: false
  - name: FMSG_HOME_CHANNEL_NAME
    description: "Human label for the home channel (defaults to the address)"
    prompt: "Home channel display name (or empty)"
    password: false
  - name: FMSG_DEFAULT_TOPIC
    description: "Topic for agent-initiated root messages (default: Hermes)"
    prompt: "Default thread topic (or empty)"
    password: false
