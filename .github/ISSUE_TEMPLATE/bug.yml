name: Bug report
description: Report a reproducible hermes-fmsg problem
title: "[bug] "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, JWTs, private messages, or unredacted addresses.
  - type: input
    id: versions
    attributes:
      label: Versions
      description: hermes-fmsg, Hermes Agent, Python, and operating system
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options: [Hosted fmsg provider, Self-hosted fmsg, Other]
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and sanitized logs
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private message bodies, and personal addresses.
          required: true
